name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write # changesets/action pushes version commits + creates tags
  pull-requests: write # changesets/action opens the Version Packages PR
  id-token: write # required for npm OIDC provenance

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # changesets needs full git history

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all publishable packages
        run: |
          bun run --cwd packages/core build
          bun run --cwd packages/remark build
          bun run --cwd packages/markdown-it build
          bun run --cwd packages/comark build
          bun run --cwd packages/blueprint build

      - name: Verify packed exports resolve to .js (not .ts)
        run: node scripts/verify-publish.mjs

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: node scripts/publish-packages.mjs
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # DO NOT add NODE_AUTH_TOKEN / NPM_TOKEN here.
          # npm auth is handled via OIDC (id-token: write above) — no secret token needed.
