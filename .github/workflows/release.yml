name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write  # required for OIDC npm publish

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build core package
        working-directory: packages/core
        run: bun run build

      - name: Build adapter packages
        run: |
          bun run --cwd packages/remark build
          bun run --cwd packages/markdown-it build
          bun run --cwd packages/comark build

      - name: Set package versions from tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          for pkg in core remark markdown-it comark; do
            bun x json -I -f packages/$pkg/package.json -e "this.version='$TAG'"
          done

      - name: Publish core to npm
        working-directory: packages/core
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
        run: npm publish --access public --provenance

      - name: Publish remark adapter to npm
        working-directory: packages/remark
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
        run: npm publish --access public --provenance

      - name: Publish markdown-it adapter to npm
        working-directory: packages/markdown-it
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
        run: npm publish --access public --provenance

      - name: Publish comark adapter to npm
        working-directory: packages/comark
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
        run: npm publish --access public --provenance