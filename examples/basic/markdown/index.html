<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lean Markdown Renderer</title>
  <link rel="stylesheet" href="/node_modules/remark-lean/src/lean.css">
  <style>
    body {
      font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
      background-color: #0f111a;
      color: #e4e6eb;
      max-width: 800px;
      margin: 60px auto;
      padding: 0 20px;
      line-height: 1.6;
    }

    h1 {
      color: #ffffff;
      font-size: 2.5rem;
      border-bottom: 2px dashed #3e4451;
      padding-bottom: 15px;
      margin-bottom: 30px;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 1.15rem;
      color: #b2ccd6;
    }
  </style>
</head>

<body>
  <div id="content"></div>
  <script type="module">
    import { leanHydrate } from "remark-lean/runtime";
    leanHydrate();
  </script>
</body>

</html>
